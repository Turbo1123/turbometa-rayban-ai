variables:
- name: +applicationName
  type: ssu/expansion
  definitions:
  - locale: zh-Hans
    synomyms:
    - CameraAccess
  - locale: en
    synomyms:
    - CameraAccess
- name: +prefix
  type: ssu/expansion
  definitions:
  - locale: en
    synomyms:
      $ref: ssu://Resources/prefix/en.yaml
- name: +standardAppShortcutNegatives
  type: ssu/expansion
  definitions:
  - locale: en
    synomyms:
      $ref: ssu://Resources/standardAppShortcutNegatives/en.yaml
